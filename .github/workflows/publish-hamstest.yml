name: Publish hamstest

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./hamstest[dev]"

      - name: Check formatting
        run: ruff format --check .

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip build twine
          python -m build --sdist hamstest --outdir dist
          python -m twine check dist/*

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: hamstest-sdist
          path: dist/*.tar.gz

  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_SKIP: "*-musllinux_*"
          CIBW_TEST_COMMAND: "python -c \"from hamstest import Estimator; import hamstest_native\""
        with:
          package-dir: hamstest
          output-dir: wheelhouse

      - name: Check wheels
        shell: bash
        run: |
          python -m pip install --upgrade twine
          python -m twine check wheelhouse/*

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: hamstest-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs:
      - build-sdist
      - build-wheels
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: testpypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: hamstest-*
          path: dist
          merge-multiple: true

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-sdist
      - build-wheels
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: hamstest-*
          path: dist
          merge-multiple: true

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
